services:
  - type: web
    name: pantry-guardian-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: BACKEND_ONLY_DEPLOY
        value: true
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: RECEIPT_OCR_API_URL
        sync: false
      - key: RECEIPT_OCR_OCR_PATH
        value: /ocr/
      - key: FRONTEND_URL
        sync: false
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
